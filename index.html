<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrgConnect — Match yourself to your org in the School of Computing</title>
    <meta
      name="description"
      content="Every official Holy Angel University School of Computing organization in one place — with an AI wildcard that matches you to the ones that fit."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Dark-first: this design lives in the dark. Everyone gets the emerald
      // theme unless they've explicitly chosen light. Runs before first paint.
      (function () {
        if (localStorage.getItem("oc-theme") !== "light") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
